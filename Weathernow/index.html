<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Weather Now</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css.style.css" />
</head>

<body>
  <header class="site-header">
    <h1>Weather Now</h1>
    <p>A simple beginner-friendly weather app</p>
  </header>

  <main class="container">
    <section class="card controls">
      <h2>Choose a City</h2>
      <label for="citySelect">Select a location:</label>

      <select id="citySelect">
        <option value="36.9685,-86.4808">Bowling Green, KY</option>
        <option value="38.2527,-85.7585">Louisville, KY</option>
        <option value="36.1627,-86.7816">Nashville, TN</option>
        <option value="40.7128,-74.0060">New York, NY</option>
        <option value="34.0522,-118.2437">Los Angeles, CA</option>
      </select>

      <button id="loadWeatherBtn">Load Weather</button>
    </section>

    <section class="card weather-card">
      <h2>Current Forecast</h2>
      <div id="statusMessage">Select a city and load the weather.</div>

      <div id="weatherResult" class="weather-result" hidden>
        <img id="weatherIcon" src="" alt="Weather icon" width="80" hidden>

        <p><strong>Temperature:</strong> <span id="temp"></span>°F</p>
        <p><strong>Wind Speed:</strong> <span id="wind"></span> mph</p>
        <p><strong>Weather Code:</strong> <span id="code"></span></p>
        <p><strong>Time:</strong> <span id="time"></span></p>
        <p><strong>Description:</strong> <span id="desc"></span></p>
      </div>
    </section>
  </main>

  <!-- Load your script AFTER the HTML -->
  <script src="js.app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("Service worker registered"))
        .catch(err => console.log("SW registration failed:", err));
    }
  </script>
</body>
</html>
